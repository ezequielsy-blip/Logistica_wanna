[build]
builder = "nixpacks"

[deploy]
startCommand = "streamlit run logieze_web.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false --server.enableXsrfProtection=false"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 600
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
